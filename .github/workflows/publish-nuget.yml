name: Publish NuGet

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install MAUI workloads
        run: dotnet workload install maui-android maui-ios

      - name: Restore
        run: dotnet restore "MauiOtpKit/MauiOtpKit.csproj"

      - name: Build
        run: dotnet build "MauiOtpKit/MauiOtpKit.csproj" -c Release --no-restore

      - name: Pack
        run: dotnet pack "MauiOtpKit/MauiOtpKit.csproj" -c Release --no-build -o "${{ github.workspace }}/artifacts"

      - name: Push to NuGet.org
        run: dotnet nuget push "${{ github.workspace }}/artifacts/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source "https://api.nuget.org/v3/index.json" --skip-duplicate
