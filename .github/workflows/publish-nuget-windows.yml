name: Publish to NuGet (Windows - Full Build)

on:
  workflow_dispatch:  # Manual trigger for full Windows build
    inputs:
      publish:
        description: 'Publish to NuGet.org'
        required: true
        type: choice
        options:
          - 'true'
          - 'false'
        default: 'false'

jobs:
  publish-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install MAUI workload
      run: |
        dotnet workload restore
        dotnet workload install maui -s https://aka.ms/dotnet/maui/latest-release-feed
      shell: pwsh
      continue-on-error: true

    - name: Verify workload installation
      run: dotnet workload list
      shell: pwsh

    - name: Restore dependencies
      run: dotnet restore MauiOtpKit.Core/MauiOtpKit.Core.csproj
      shell: pwsh

    - name: Build MauiOtpKit.Core
      run: dotnet build MauiOtpKit.Core/MauiOtpKit.Core.csproj -c Release --no-restore
      shell: pwsh

    - name: Pack MauiOtpKit.Core
      run: dotnet pack MauiOtpKit.Core/MauiOtpKit.Core.csproj -c Release -o ./nupkg --no-build
      shell: pwsh

    - name: Restore MauiOtpKit (Platform)
      run: dotnet restore MauiOtpKit/MauiOtpKit.csproj
      shell: pwsh
      continue-on-error: true

    - name: Build MauiOtpKit (Platform-specific)
      run: dotnet build MauiOtpKit/MauiOtpKit.csproj -c Release --no-restore
      shell: pwsh
      continue-on-error: true

    - name: Pack MauiOtpKit (Platform-specific)
      run: dotnet pack MauiOtpKit/MauiOtpKit.csproj -c Release -o ./nupkg --no-build
      shell: pwsh
      continue-on-error: true

    - name: List generated packages
      run: Get-ChildItem ./nupkg -Filter *.nupkg | ForEach-Object { Write-Host $_.FullName }
      shell: pwsh

    - name: Push to NuGet.org
      if: github.event.inputs.publish == 'true' && (github.repository_owner == github.actor)
      run: |
        dotnet nuget push ./nupkg/*.nupkg `
          --api-key ${{ secrets.NUGET_API_KEY }} `
          --source https://api.nuget.org/v3/index.json `
          --skip-duplicate
      shell: pwsh
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

    - name: Create GitHub Release Summary
      if: success()
      run: |
        $corePackage = Get-ChildItem ./nupkg -Filter MauiOtpKit.Core*.nupkg | Select-Object -First 1
        $platformPackage = Get-ChildItem ./nupkg -Filter MauiOtpKit.*.nupkg | Where-Object { $_.Name -notmatch "Core" } | Select-Object -First 1
        
        Write-Host "## 🎉 NuGet Packages Built Successfully" >> $env:GITHUB_STEP_SUMMARY
        Write-Host "" >> $env:GITHUB_STEP_SUMMARY
        Write-Host "### Built Packages:" >> $env:GITHUB_STEP_SUMMARY
        
        if ($corePackage) {
          Write-Host "- **MauiOtpKit.Core** ✅" >> $env:GITHUB_STEP_SUMMARY
          Write-Host "  Size: $([Math]::Round($corePackage.Length/1KB, 2)) KB" >> $env:GITHUB_STEP_SUMMARY
          Write-Host "  NuGet: https://www.nuget.org/packages/MauiOtpKit.Core/" >> $env:GITHUB_STEP_SUMMARY
        }
        
        if ($platformPackage) {
          Write-Host "- **MauiOtpKit** (Platform) ✅" >> $env:GITHUB_STEP_SUMMARY
          Write-Host "  Size: $([Math]::Round($platformPackage.Length/1KB, 2)) KB" >> $env:GITHUB_STEP_SUMMARY
          Write-Host "  NuGet: https://www.nuget.org/packages/MauiOtpKit/" >> $env:GITHUB_STEP_SUMMARY
        } else {
          Write-Host "- **MauiOtpKit** (Platform) ⚠️  MAUI SDK not available - build locally on Windows with MAUI workload installed" >> $env:GITHUB_STEP_SUMMARY
        }
        
        Write-Host "" >> $env:GITHUB_STEP_SUMMARY
        Write-Host "### Installation:" >> $env:GITHUB_STEP_SUMMARY
        Write-Host '```bash' >> $env:GITHUB_STEP_SUMMARY
        Write-Host "dotnet add package MauiOtpKit.Core" >> $env:GITHUB_STEP_SUMMARY
        if ($platformPackage) {
          Write-Host "dotnet add package MauiOtpKit" >> $env:GITHUB_STEP_SUMMARY
        }
        Write-Host '```' >> $env:GITHUB_STEP_SUMMARY
      shell: pwsh

    - name: Upload artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: nuget-packages-windows
        path: ./nupkg/
        retention-days: 30

    - name: Handle build errors
      if: failure()
      run: |
        Write-Host "⚠️  Build encountered issues!" -ForegroundColor Yellow
        Write-Host "" -ForegroundColor Yellow
        Write-Host "If MauiOtpKit (platform) failed but MauiOtpKit.Core succeeded:" -ForegroundColor Yellow
        Write-Host "This is expected - MAUI SDK requires local Windows build" -ForegroundColor Yellow
        Write-Host "" -ForegroundColor Yellow
        Write-Host "To build MauiOtpKit locally:" -ForegroundColor Yellow
        Write-Host "1. Install MAUI workload: dotnet workload install maui" -ForegroundColor Yellow
        Write-Host "2. Run: .\build-and-pack.ps1" -ForegroundColor Yellow
        Write-Host "3. Manually push: dotnet nuget push ./nupkg/*.nupkg --api-key YOUR_KEY" -ForegroundColor Yellow
      shell: pwsh

    - name: Handle publish errors
      if: failure() && github.event.inputs.publish == 'true'
      run: |
        Write-Host "⚠️  Publishing skipped!" -ForegroundColor Yellow
        Write-Host "Verify:" -ForegroundColor Yellow
        Write-Host "1. NUGET_API_KEY secret is configured" -ForegroundColor Yellow
        Write-Host "2. Version is incremented in .csproj files" -ForegroundColor Yellow
        Write-Host "3. No duplicate versions on NuGet.org" -ForegroundColor Yellow
      shell: pwsh
